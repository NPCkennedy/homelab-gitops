apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: searxng
  namespace: searxng
  labels:
    app: searxng
    app.kubernetes.io/part-of: searxng
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`searxng.homelab.local`)
      kind: Rule
      services:
        - name: searxng
          port: 8080
  tls:
    secretName: homelab-local-tls
