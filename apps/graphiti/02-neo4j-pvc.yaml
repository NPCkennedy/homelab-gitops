apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: neo4j-data
  namespace: neo4j
  labels:
    app: neo4j
    app.kubernetes.io/part-of: spencer-os
  annotations:
    # Bind to the spencer-os daily snapshot group
    recurring-job-group.longhorn.io/spencer-os: enabled
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
